        <h1 id="都去上早操！"><a href="#都去上早操！" class="headerlink" title="都去上早操！"></a>都去上早操！</h1><h2 id="骗你的天天查人不可能不去"><a href="#骗你的天天查人不可能不去" class="headerlink" title="骗你的天天查人不可能不去"></a>骗你的天天查人不可能不去</h2><p>这是一个随机选人程序，可以从指定的n个人中随机选出m位去做早操。</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdlib.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;time.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="type">int</span> <span class="title function_">main</span><span class="params">()</span> &#123;</span><br><span class="line">	<span class="comment">// 六个人的名单</span></span><br><span class="line">	<span class="type">char</span> *people[] = &#123;<span class="string">&quot;王星&quot;</span>, <span class="string">&quot;王柏&quot;</span>, <span class="string">&quot;莫奈&quot;</span>, <span class="string">&quot;姚祉&quot;</span>, <span class="string">&quot;肖鑫&quot;</span>, <span class="string">&quot;石安&quot;</span>&#125;;</span><br><span class="line">	<span class="type">int</span> n, i, temp;</span><br><span class="line">	<span class="type">int</span> selected[<span class="number">6</span>] = &#123;<span class="number">0</span>&#125;; <span class="comment">// 标记是否被选中</span></span><br><span class="line">	</span><br><span class="line">	<span class="comment">// 初始化随机数种子</span></span><br><span class="line">	srand((<span class="type">unsigned</span> <span class="type">int</span>)time(<span class="literal">NULL</span>));</span><br><span class="line">	</span><br><span class="line">	<span class="comment">// 输入要抽取的人数</span></span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;请输入要抽取的人数（1-6）：&quot;</span>);</span><br><span class="line">	<span class="built_in">scanf</span>(<span class="string">&quot;%d&quot;</span>, &amp;n);</span><br><span class="line">	</span><br><span class="line">	<span class="comment">// 验证输入合法性</span></span><br><span class="line">	<span class="keyword">if</span> (n &lt; <span class="number">1</span> || n &gt; <span class="number">6</span>) &#123;</span><br><span class="line">		<span class="built_in">printf</span>(<span class="string">&quot;输入错误！请输入1到6之间的数字。\n&quot;</span>);</span><br><span class="line">		<span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">	<span class="comment">// 随机抽取n个人</span></span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;抽取结果：&quot;</span>);</span><br><span class="line">	<span class="keyword">for</span> (i = <span class="number">0</span>; i &lt; n; i++) &#123;</span><br><span class="line">		<span class="comment">// 生成0-5的随机数，直到找到未被选中的人</span></span><br><span class="line">		<span class="keyword">do</span> &#123;</span><br><span class="line">			temp = rand() % <span class="number">6</span>;</span><br><span class="line">		&#125; <span class="keyword">while</span> (selected[temp] == <span class="number">1</span>);</span><br><span class="line">		</span><br><span class="line">		selected[temp] = <span class="number">1</span>; <span class="comment">// 标记为已选中</span></span><br><span class="line">		<span class="built_in">printf</span>(<span class="string">&quot;%s &quot;</span>, people[temp]);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;\n&quot;</span>);</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
